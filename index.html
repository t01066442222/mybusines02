<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 320px;
        }

        .display {
            background: #0f3460;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .expression {
            color: #8a8a9a;
            font-size: 16px;
            min-height: 24px;
            word-break: break-all;
        }

        .result {
            color: #e0e0e0;
            font-size: 36px;
            font-weight: bold;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            font-weight: 600;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: #1a1a40;
            color: #e0e0e0;
        }

        .btn-number:hover {
            background: #252560;
        }

        .btn-operator {
            background: #e94560;
            color: white;
        }

        .btn-operator:hover {
            background: #ff6b81;
        }

        .btn-clear {
            background: #533483;
            color: white;
        }

        .btn-clear:hover {
            background: #6a45a0;
        }

        .btn-equals {
            background: #0f9b58;
            color: white;
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: #12b866;
        }

        .history {
            margin-top: 20px;
            background: #0f3460;
            border-radius: 12px;
            padding: 16px;
            max-height: 160px;
            overflow-y: auto;
        }

        .history-title {
            color: #8a8a9a;
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .history-clear {
            background: none;
            border: none;
            color: #e94560;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            font-weight: 600;
        }

        .history-item {
            color: #c0c0d0;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a40;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-empty {
            color: #555;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn-clear" onclick="clearAll()">C</button>
            <button class="btn-clear" onclick="backspace()">&#9003;</button>
            <button class="btn-operator" onclick="addOperator('%')">%</button>
            <button class="btn-operator" onclick="addOperator('/')">÷</button>

            <button class="btn-number" onclick="addNumber('7')">7</button>
            <button class="btn-number" onclick="addNumber('8')">8</button>
            <button class="btn-number" onclick="addNumber('9')">9</button>
            <button class="btn-operator" onclick="addOperator('*')">×</button>

            <button class="btn-number" onclick="addNumber('4')">4</button>
            <button class="btn-number" onclick="addNumber('5')">5</button>
            <button class="btn-number" onclick="addNumber('6')">6</button>
            <button class="btn-operator" onclick="addOperator('-')">−</button>

            <button class="btn-number" onclick="addNumber('1')">1</button>
            <button class="btn-number" onclick="addNumber('2')">2</button>
            <button class="btn-number" onclick="addNumber('3')">3</button>
            <button class="btn-operator" onclick="addOperator('+')">+</button>

            <button class="btn-number" onclick="addNumber('0')">0</button>
            <button class="btn-number" onclick="addDot()">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
        <div class="history" id="history">
            <div class="history-title">
                <span>계산 기록</span>
                <button class="history-clear" onclick="clearHistory()">지우기</button>
            </div>
            <div class="history-empty" id="historyEmpty">기록이 없습니다</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let current = '0';
        let expression = '';
        let hasResult = false;

        const resultEl = document.getElementById('result');
        const expressionEl = document.getElementById('expression');

        function updateDisplay() {
            resultEl.textContent = current;
            expressionEl.textContent = expression;
        }

        function addNumber(num) {
            if (hasResult) {
                current = num;
                expression = '';
                hasResult = false;
            } else if (current === '0') {
                current = num;
            } else {
                current += num;
            }
            updateDisplay();
        }

        function addDot() {
            if (hasResult) {
                current = '0.';
                expression = '';
                hasResult = false;
            } else if (!current.includes('.')) {
                current += '.';
            }
            updateDisplay();
        }

        function addOperator(op) {
            const displayOp = { '+': ' + ', '-': ' − ', '*': ' × ', '/': ' ÷ ', '%': ' % ' };
            if (hasResult) {
                expression = current + displayOp[op];
                hasResult = false;
            } else {
                expression += current + displayOp[op];
            }
            current = '0';
            updateDisplay();
        }

        function calculate() {
            try {
                const fullExpression = expression + current;
                const calcExpression = fullExpression
                    .replace(/ × /g, '*')
                    .replace(/ ÷ /g, '/')
                    .replace(/ − /g, '-')
                    .replace(/ \+ /g, '+')
                    .replace(/ % /g, '%');

                let result = Function('"use strict"; return (' + calcExpression + ')')();

                if (!isFinite(result)) {
                    current = '오류';
                } else {
                    result = parseFloat(result.toPrecision(12));
                    current = String(result);
                }

                addHistory(fullExpression + ' = ' + current);
                expression = fullExpression + ' =';
                hasResult = true;
                updateDisplay();
            } catch {
                current = '오류';
                hasResult = true;
                updateDisplay();
            }
        }

        function clearAll() {
            current = '0';
            expression = '';
            hasResult = false;
            updateDisplay();
        }

        function backspace() {
            if (hasResult) return;
            current = current.length > 1 ? current.slice(0, -1) : '0';
            updateDisplay();
        }

        const historyList = document.getElementById('historyList');
        const historyEmpty = document.getElementById('historyEmpty');

        function addHistory(text) {
            historyEmpty.style.display = 'none';
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = text;
            historyList.prepend(item);
        }

        function clearHistory() {
            historyList.innerHTML = '';
            historyEmpty.style.display = 'block';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addNumber(e.key);
            else if (e.key === '.') addDot();
            else if (e.key === '+') addOperator('+');
            else if (e.key === '-') addOperator('-');
            else if (e.key === '*') addOperator('*');
            else if (e.key === '/') { e.preventDefault(); addOperator('/'); }
            else if (e.key === '%') addOperator('%');
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
